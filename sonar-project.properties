sonar.organization=terminalis
sonar.projectKey=terminalis_appcraft

# Scans the compiler's GENERATED Android projects (the paper's zero-bugs
# methodology). out/ does not exist in the repo:
# the android CI job generates all three examples into it immediately before
# the scan step runs. Not the TypeScript compiler sources.
sonar.sources=out
sonar.exclusions=**/build/**,**/.gradle/**

# out/ is gitignored, and the scanner excludes SCM-ignored files by default —
# without this, the analysis indexes 0 lines of code.
sonar.scm.exclusions.disabled=true

# Emitted projects pin minSdk 26; without this the Android rules assume 27.
sonar.android.minsdkversion.min=26

# Coverage and copy-paste detection are intentionally excluded project-wide:
# - Coverage: test coverage is not a meaningful metric for deterministic
#   generated output. The emitted apps are verified by the compiler's golden/
#   determinism test wall and by golden-path runs on a real emulator
#   (KNOWN_GOOD.md) — none of which produce coverage data Sonar can see.
# - Duplication: the example apps are generated from the same templates;
#   structural similarity between them is what a compiler does, not tech debt.
# The enforced quality bar is unchanged: the zero-open-Security/Reliability
# gate in CI (.github/scripts/sonar-zero-bugs-gate.sh).
sonar.coverage.exclusions=**/*
sonar.cpd.exclusions=**/*
